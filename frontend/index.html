<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MATIEO — Mortality Insights and Memorial Platform" />

    <!-- Montserrat + Noto Sans Arabic fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>MATIEO</title>
    <!-- Prevent flash of wrong theme on load -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme')
          if (t === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (_) {}
      })()
    </script>
    <!-- Prevent flash of wrong locale/dir on load -->
    <script>
      (function () {
        try {
          var l = localStorage.getItem('matieo-locale')
          var locale = l ? JSON.parse(l).state && JSON.parse(l).state.locale : 'en'
          if (locale === 'ar') {
            document.documentElement.dir = 'rtl'
            document.documentElement.lang = 'ar'
          } else if (locale) {
            document.documentElement.lang = locale
          }
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
