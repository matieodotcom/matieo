name: Deploy Frontend — Development

on:
  push:
    branches: [dev]
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (development)
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.DEV_SUPABASE_ANON_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.DEV_CLOUDINARY_UPLOAD_PRESET }}
          VITE_API_URL: ${{ secrets.DEV_API_URL }}
          VITE_APP_ENV: development
        run: npm run build

      # Deploy to Hostinger dev subdomain via FTP
      - name: Deploy to Hostinger (dev)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER_DEV }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD_DEV }}
          protocol: ftps
          port: 21
          local-dir: frontend/dist/
          server-dir: /dev/
