## render.yaml — MATIEO Infrastructure as Code
## 2 active free services: API (dev) + ML (dev)
## Prod services commented out — uncomment when ready to go live
## Docs: https://render.com/docs/blueprint-spec

services:

  # ════════════════════════════════════════════════════════════════════════════
  # DEVELOPMENT — branch: dev (active, free tier)
  # ════════════════════════════════════════════════════════════════════════════

  - type: web
    name: matieo-api-dev
    runtime: node
    region: singapore
    plan: free
    branch: dev
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: development
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false                    # Dev Supabase project URL
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false                    # Dev service role key
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER_PREFIX
        value: matieo/dev
      - key: ML_SERVICE_URL
        fromService:
          name: matieo-ml-dev
          type: web
          property: host
      - key: ML_SERVICE_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false                    # https://dev.matieo.com
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 200

    autoDeploy: true

  - type: web
    name: matieo-ml-dev
    runtime: python
    region: singapore
    plan: free
    branch: dev
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health

    envVars:
      - key: APP_ENV
        value: development
      - key: PORT
        value: 8000
      - key: SUPABASE_URL
        sync: false                    # Dev Supabase project URL
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NODE_API_SECRET
        sync: false                    # Same value as matieo-api-dev ML_SERVICE_SECRET
      - key: ALLOWED_ORIGINS
        fromService:
          name: matieo-api-dev
          type: web
          property: host

    autoDeploy: true

